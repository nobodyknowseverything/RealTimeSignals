<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Signals Tracker • Created with Grok</title>
  <link rel="icon" href="data:,">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    /* Your styles unchanged – keep as is */
    body{margin:0;background:#000;font-family:system-ui,sans-serif;overflow-x:hidden;color:#fff}
    .toggle-btn{background:#1f2937;border:none;padding:10px;cursor:pointer;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;transition:all .3s;position:relative}
    .toggle-btn:hover{background:#374151}
    .icon-moon {display: block;}
    .icon-sun {display: none;}
    html:not(.dark) .icon-moon {display: none;}
    html:not(.dark) .icon-sun {display: block;}
    select{font-size:14px;padding:8px 12px;border-radius:8px;background:#1f2937;color:#fff;border:1px solid #374151}
    .live-badge{background:linear-gradient(90deg,#059669,#10b981);color:white;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:bold}
    .grok-logo{filter:drop-shadow(0 0 4px #9500ff);animation:glow 2s ease-in-out infinite alternate}
    @keyframes glow{from{filter:drop-shadow(0 0 2px #9500ff)}to{filter:drop-shadow(0 0 8px #9500ff)}}
    .signal-card{border-radius:1rem;overflow:hidden;background:linear-gradient(135deg,#1e293b,#0f172a);border:1px solid #334155;box-shadow:0 10px 20px rgba(0,255,255,0.1);position:relative;cursor:pointer;transition:transform .3s}
    .signal-card:hover{transform:scale(1.03)}
    .signal-header{font-size:1.2rem;font-weight:bold;padding:1.2rem;text-align:center;color:#fff;position:relative}
    .signal-body{padding:1.5rem;text-align:center;position:relative;overflow:hidden}
    .signal-main{font-size:3rem;font-weight:bold;margin:1rem 0}
    .buy {color:#00ff9d;text-shadow:0 0 15px #00ff9d}
    .sell {color:#ff4d4d;text-shadow:0 0 15px #ff4d4d}
    .hold {color:#ffd700;text-shadow:0 0 10px #ffd700}
    .rationale{font-size:1.1rem;color:#a0aec0;margin:1rem 0}
    .sentiment{font-size:1.1rem;margin:0.5rem 0;padding:0.6rem 1rem;border-radius:999px;display:inline-block;font-weight:bold}
    .bullish{background:#059669;color:white}
    .bearish{background:#dc2626;color:white}
    .neutral{background:#d97706;color:white}
    .rocket{position:absolute;bottom:-80px;font-size:4.5rem;opacity:0;transition:opacity .3s, bottom 2.2s ease-in, left 2.2s ease-in;pointer-events:none;z-index:20}
    .rocket.active{opacity:1;bottom:120%}
    .rocket.moonshot{font-size:8rem !important;animation:shake 0.5s infinite}
    @keyframes shake{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(5px, -10px) rotate(5deg)}50%{transform:translate(-5px, 5px) rotate(-5deg)}75%{transform:translate(10px, -5px) rotate(5deg)}100%{transform:translate(0,0) rotate(0)}}
    .rocket.left{left:10%}
    .rocket.right{left:auto;right:10%}
    .overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.95);z-index:50;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .4s}
    .overlay.active{opacity:1;visibility:visible}
    .overlay-chart{max-width:95%;max-height:95%;width:1400px;height:700px;background:#111;border:3px solid #00ffff;border-radius:1rem;overflow:hidden;box-shadow:0 0 40px #00ffff80;position:relative}
    .close-btn{position:absolute;top:20px;right:20px;background:#1e293b;color:#fff;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;cursor:pointer;z-index:10}
    .moon-calculator{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:1rem;padding:1.5rem;border:1px solid #334155;box-shadow:0 10px 25px rgba(0,255,255,0.1);text-align:center}
    .moon-calculator h3{font-size:1.6rem;font-weight:bold;color:#00ffff;text-shadow:0 0 10px #00ffff;margin-bottom:1rem}
    .input-group{margin:1rem 0;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
    .input-label{font-size:1rem;color:#ccc;width:140px;text-align:right;flex-shrink:0}
    input[type="number"]{background:#1e293b;color:white;border:1px solid #334155;border-radius:8px;padding:8px 12px;width:200px;font-size:1rem;text-align:center}
    .portfolio-value{font-size:2.4rem;font-weight:bold;color:#00ffff;text-shadow:0 0 15px #00ffff;margin:1.2rem 0;transition:all .5s}
    .my-moon-progress{margin:1rem 0}
    .my-moon-bar{height:24px;background:#1e293b;border-radius:12px;overflow:hidden;position:relative}
    .my-moon-fill{height:100%;background:linear-gradient(90deg,#ff0066,#00ffff);transition:width 1s ease}
    .my-moon-text{position:absolute;top:0;left:0;width:100%;text-align:center;line-height:24px;font-weight:bold;color:#fff;font-size:1rem;text-shadow:0 0 5px #000}
    .moon-message{font-size:1.3rem;margin-top:0.8rem;font-weight:bold;color:#00ffff}
    .moon-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1rem}
    .moon-stat{font-size:1rem;color:#ccc}
    .moon-stat-value{font-size:1.3rem;font-weight:bold;color:#00ffff;margin-top:0.3rem}
    @media (max-width: 768px) {
      .portfolio-value{font-size:2rem;}
      .moon-stat-value{font-size:1.1rem;}
      .input-label{width:100%;text-align:center;}
      input[type="number"]{width:100%;max-width:300px;}
    }
  </style>
</head>
<body class="transition-colors duration-500">
  <!-- Your banner, title, toggles, selectors as before – keep unchanged -->

  <!-- Add token selector if not already there -->
  <div class="fixed top-28 right-4 z-50 flex gap-3 items-center">
    <!-- theme + currency + new token select -->
    <select id="tokenSelect">
      <option value="ripple">XRP</option>
      <option value="bitcoin">BTC</option>
      <option value="ethereum">ETH</option>
      <option value="solana">SOL</option>
    </select>
    <!-- rest unchanged -->
  </div>

  <!-- Signal cards and moon calc – keep as is -->

<script>
  // Define ALL functions FIRST to avoid ReferenceError
  function updateMyMoonCalculator() {
    const holdings = parseFloat(document.getElementById('myHoldings').value) || 0;
    const moonPriceUSD = parseFloat(document.getElementById('myMoonPrice').value) || 0;
    const rate = rates[currentCurrency] || 1;
    const sym = symbols[currentCurrency] || '$';
    const currentValue = holdings * currentUSDPrice * rate;
    document.getElementById('myCurrentValue').textContent = sym + currentValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const moonValue = holdings * moonPriceUSD;
    document.getElementById('myMoonValue').textContent = sym + moonValue.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    document.getElementById('myMoonPriceDisplay').textContent = sym + moonPriceUSD.toFixed(2);
    document.getElementById('myHoldingsDisplay').textContent = holdings.toLocaleString() + ' ' + tokenSymbol;
    const progress = moonPriceUSD > 0 ? (currentUSDPrice / moonPriceUSD) * 100 : 0;
    document.getElementById('myMoonFill').style.width = Math.min(100, progress) + '%';
    document.getElementById('myMoonText').textContent = progress.toFixed(1) + '% to your moon!';
    // add messages as before
  }

  function updateSignals() {
    // Your generateSignals logic here – keep as is
    // Example placeholder if missing:
    const sigs = { short: {sig: 'HOLD', rat: 'Data loading...', col: 'hold'}, med: {...}, long: {...} };
    // fill with actual logic when data available
    ['short','med','long'].forEach(t => {
      const cap = t.charAt(0).toUpperCase() + t.slice(1);
      document.getElementById(`currentPrice${cap}`).textContent = (symbols[currentCurrency] || '$') + currentUSDPrice.toFixed(4);
      document.getElementById(`change${cap}`).textContent = (priceChange24h >= 0 ? '+' : '') + priceChange24h.toFixed(2) + '%';
      // etc.
    });
  }

  // Live forex (your key – working per log)
  let rates = { USD: 1 };
  const symbols = { USD:'$', AUD:'A$', EUR:'€', GBP:'£', JPY:'¥', CAD:'C$', CHF:'Fr', KRW:'₩' };
  let currentCurrency = localStorage.getItem('xrpCurrency') || 'USD';
  let currentToken = 'ripple';
  let tokenSymbol = 'XRP';

  async function updateExchangeRates() {
    try {
      const res = await fetch('https://v6.exchangerate-api.com/v6/2e28bae41916290695aca1ce/latest/USD');
      const data = await res.json();
      if (data.result === 'success') {
        rates = { USD: 1, ...data.conversion_rates };
        console.log('AUD rate:', rates.AUD);
      }
    } catch (e) {
      console.warn('Forex failed, fallback:', e);
      rates = { USD:1, AUD:1.407 /* etc */ };
    }
    updateSignals();
    updateMyMoonCalculator();
  }

  // Price + historical (CoinGecko only to avoid Binance CORS)
  let currentUSDPrice = 1.39;
  let priceChange24h = 0;
  let historicalData = [];

  async function updatePrice() {
    try {
      // Price
      const priceRes = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${currentToken}&vs_currencies=usd&include_24hr_change=true`);
      const priceData = await priceRes.json();
      currentUSDPrice = priceData[currentToken].usd;
      priceChange24h = priceData[currentToken].usd_24h_change || 0;

      // Historical for indicators (7 days to reduce load)
      const histRes = await fetch(`https://api.coingecko.com/api/v3/coins/${currentToken}/ohlc?vs_currency=usd&days=7`);
      historicalData = await histRes.json();

      updateSignals(); // recalc indicators/signals
    } catch (e) {
      console.error('Data fetch failed:', e);
      document.querySelectorAll('.signal-main').forEach(el => el.textContent = 'Data Error');
    }
    updateMyMoonCalculator();
  }

  // Token change
  document.getElementById('tokenSelect').addEventListener('change', e => {
    currentToken = e.target.value;
    tokenSymbol = e.target.options[e.target.selectedIndex].text;
    updatePrice();
  });

  // Start
  updateExchangeRates();
  updatePrice();
  setInterval(updatePrice, 60000); // slower to avoid 429
  updateMyMoonCalculator();

  // Keep theme, chart overlay, etc. from your code
</script>
</body>
</html>
